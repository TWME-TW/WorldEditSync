# WorldEditSync Configuration

# Sync mode: "proxy", "s3", or "database"
# - proxy: Sync via BungeeCord/Velocity proxy using Plugin Messages (requires proxy plugin).
# - s3: Sync via S3-compatible storage (e.g. MinIO). No proxy plugin needed.
# - database: Sync via Redis, MySQL, MariaDB, PostgreSQL, or SQLite.
sync-mode: "proxy"

# Token for authenticated encryption (AES-256-GCM).
# - proxy mode: REQUIRED. Protects Plugin Messages between Paper and Proxy.
# - s3/database mode: encrypts clipboard data before storing it.
# This MUST be the same on every participating Paper server. Proxy mode must also
# use the same value on the Proxy (BungeeCord/Velocity).
# S3/database mode may leave this empty, but stored clipboards will be plaintext.
token: ""

# Show clipboard upload/download status to players in the Action Bar.
# Intermediate progress updates are coalesced and limited to at most one per
# second per player. Start and completion are each shown at most once.
action-bar:
  enabled: true

# S3 storage settings (only used when sync-mode is "s3")
s3:
  # S3-compatible endpoint URL (e.g. MinIO server address)
  endpoint: "http://localhost:9000"
  # Access key (username)
  access-key: "minioadmin"
  # Secret key (password)
  secret-key: "minioadmin"
  # Bucket name to store clipboard data
  bucket: "worldeditsync"
  # Region (optional, can leave empty for MinIO)
  region: ""
  # How often to check S3 for clipboard updates (in ticks, 20 ticks = 1 second)
  check-interval: 40

# Shared database settings (only used when sync-mode is "database")
database:
  # redis also supports protocol-compatible Valkey and KeyDB servers.
  # SQL options: mysql, mariadb, postgresql, sqlite
  # SQLite is suitable for multiple Paper processes only when they run on the same
  # host and share this local file. Use a network database across separate hosts.
  type: "sqlite"
  # Optional complete connection URL. Leave empty to build one from host/port/name.
  # Examples:
  #   redis://:password@127.0.0.1:6379/0
  #   jdbc:mysql://127.0.0.1:3306/worldeditsync
  #   jdbc:mariadb://127.0.0.1:3306/worldeditsync
  #   jdbc:postgresql://127.0.0.1:5432/worldeditsync
  # SQLite defaults to plugins/WorldEditSync/clipboards.db when this is empty.
  url: ""
  host: "127.0.0.1"
  # 0 selects the backend default (Redis 6379, MySQL/MariaDB 3306, PostgreSQL 5432).
  port: 0
  name: "worldeditsync"
  username: ""
  password: ""
  table: "worldeditsync_clipboards"
  key-prefix: "worldeditsync"
  pool-size: 4
  connection-timeout-ms: 10000
  check-interval: 40
  # Expire database clipboards after this many minutes. SQL rows are removed when
  # next inspected; Redis applies a native key TTL. 0 keeps them forever.
  ttl-minutes: 60

# ============================================================
# Advanced transfer settings
# ============================================================
transfer:
  # Size of each chunk in bytes (~30KB, must stay below 32KB plugin message limit)
  chunk-size: 30000
  # Transfer session timeout in milliseconds
  session-timeout-ms: 30000
  # Maximum clipboard size in bytes (default: 50MB)
  max-clipboard-size: 52428800
  # Delay between sending chunks in milliseconds
  chunk-send-delay-ms: 5
  # Clipboard watcher interval in ticks (20 ticks = 1 second)
  watcher-interval-ticks: 60
  # Clipboard watcher initial delay in ticks
  watcher-initial-delay-ticks: 40
  # How long to keep offline player clipboard data on proxy (in minutes, 0 = forever)
  clipboard-ttl-minutes: 60
