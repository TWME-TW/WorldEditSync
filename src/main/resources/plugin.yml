name: WorldEditSync
version: '${project.version}'
main: dev.twme.worldeditsync.paper.WorldEditSyncPaper
api-version: '1.13'
folia-supported: true
depend:
  - WorldEdit
description: Sync WorldEdit clipboard across servers
libraries:
  - io.minio:minio:9.0.0
  - com.squareup.okhttp3:okhttp-jvm:5.2.1
permissions:
  worldeditsync.sync:
    description: Allows clipboard synchronization across servers
    default: true
